{% load static %}
<!doctype html>
<html lang="en" dir="ltr">

    <head>
        <meta charset="utf-8" />
        <title>ModelMint - {% block title %} {% endblock title %}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="ModelMint - Empowering Data Scientists with Seamless Model Deployment" />
        <meta name="keywords" content="Machine Learning, AI, SaaS, Data Science, Model Deployment, Cloud Computing" />
        <meta name="author" content="ModelMint Team" />
        <meta name="email" content="support@modelmint.co" />
        <meta name="website" content="https://modelmint.co" />
        <meta name="Version" content="v1.0.0" />

        <!-- favicon -->
        <link rel="shortcut icon" href="{% static 'img/fav/logo-green.svg' %}" />
        <!-- Css -->
        <link href="{% static 'dashboard/libs/simplebar/simplebar.min.css' %}" rel="stylesheet">
        <!-- Bootstrap Css -->
        <link href="{% static 'dashboard/css/bootstrap.min.css' %}" class="theme-opt" rel="stylesheet" type="text/css" />
        <!-- Icons Css -->
        <link href="{% static 'dashboard/libs/@mdi/font/css/materialdesignicons.min.css' %}" rel="stylesheet" type="text/css">
        <link href="{% static 'dashboard/css/icons.min.css' %}" rel="stylesheet" type="text/css" />
        <!-- Style Css -->
        <link href="{% static 'dashboard/css/style.min.css' %}" class="theme-opt" rel="stylesheet" type="text/css" />
        <link href="{% static 'dashboard/css/custom.css' %}" class="theme-opt" rel="stylesheet" type="text/css" />

    </head>

    <body>
        <!-- Loader -->
        <!-- <div id="preloader">
            <div id="status">
                <div class="spinner">
                    <div class="double-bounce1"></div>
                    <div class="double-bounce2"></div>
                </div>
            </div>
        </div> -->
        <!-- Loader -->

        <div class="page-wrapper toggled">

            {% include "dashboard/includes/sidebar.html" %}

            <!-- Start Page Content -->
            <main class="page-content bg-light">
                
                {% include "dashboard/includes/top-header.html" %}

                <div class="container-fluid">
                    <div class="layout-specing">
                        {% include "dashboard/includes/messages.html" %}
                        {% block content %}

                        {% endblock content %}
                    </div>
                </div><!--end container-->

                <!-- Footer Start -->
                <footer class="shadow py-3">
                    <div class="container-fluid">
                        <div class="row align-items-center">
                            <div class="col">
                                <div class="text-sm-start text-center mx-md-2">
                                    <p class="mb-0 text-muted">© <script>document.write(new Date().getFullYear())</script> <a href="https://modelmint.co/" target="_blank" class="text-reset">ModelMint</a>.</p>
                                </div>
                            </div><!--end col-->
                        </div><!--end row-->
                    </div><!--end container-->
                </footer><!--end footer-->
                <!-- End -->
            </main>
            <!--End page-content" -->
        </div>
        <!-- page-wrapper -->
        
        <!-- javascript -->
        <script src="{% static 'dashboard/libs/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
        <script src="{% static 'dashboard/libs/feather-icons/feather.min.js' %}"></script>
        <script src="{% static 'dashboard/libs/simplebar/simplebar.min.js' %}"></script>
        <script src="{% static 'dashboard/libs/apexcharts/apexcharts.min.js' %}"></script>
        
        <!-- ✅ Add jQuery (Required for DataTables) -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <!-- ✅ Add DataTables.js -->
        <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
        <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script>
        <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap5.min.css">

        <!-- ✅ Your existing scripts -->
        <script src="{% static 'dashboard/js/plugins.init.js' %}"></script>
        <script src="{% static 'dashboard/js/app.js' %}"></script>
        <script src="{% static 'dashboard/js/custom.js' %}"></script>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css">


    </body>

</html>
