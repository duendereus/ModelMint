{% extends "dashboard/base.html" %}

{% block title %} Customize Dashboard {% endblock title %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Customize Your Dashboard</h2>

    <!-- Display Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label mb-4" style="font-size: larger !important;">Select Metrics to Display in the Main Dashboard:</label>
            <select name="metrics" multiple class="form-select">
                {% for metric in available_metrics %}
                    <option value="{{ metric.id }}" 
                        {% if metric in dashboard_selection.metrics.all %} selected {% endif %}>
                        {{ metric.name }} ({{ metric.source_upload.title }}                        )
                    </option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-success">Save Changes</button>
    </form>
</div>
{% endblock content %}
