{% load static %}

<div
  class="top-header-guest border-bottom py-2 px-4 {% if branding_enabled %}has-branding{% endif %}"
  {% if branding_enabled %}
    style="--brand-primary: {{ primary_color }}; --brand-text: {{ text_color }}; --brand-secondary: {{ secondary_color }};"
  {% endif %}
>
  <div class="guest-bar">
    <!-- Izquierda -->
    <div class="brand-left">
      <a href="{% url 'labs:labs_landing' %}" target="_blank" class="d-inline-flex align-items-center gap-2">
        {% if org_logo %}
          <img class="org-logo" src="{{ org_logo }}" alt="{{ org_name }}">
        {% else %}
          <img class="org-logo" src="{% static 'img/logo-white.svg' %}" alt="ModelMint Logo">
        {% endif %}
        <span class="labs-badge">labs</span>
      </a>
    </div>

    <!-- Centro -->
    <div class="brand-title">
      {% if notebook.organization %}
        <strong>{{ notebook.organization.name }}</strong>
      {% endif %}
    </div>

    <!-- Derecha (espaciador opcional; puede quedar vacío) -->
    <div></div>
  </div>
</div>
