{% load static %}
<section class="banner banner-one" style="height: 1000px !important;">
    <div class="circle-shape" data-parallax='{"y" : 230}'>
        <img src="{% static 'img/banner/circle-shape.png' %}" alt="circle">
    </div>

    <div class="container">
        <div class="banner-content-wrap">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <div class="banner-content">
                        <h1 class="banner-title wow pixFadeUp" data-wow-delay="0.3s">
                            Transform Raw <span>Spreadsheets</span> into <span>Insights</span> & Decision-Ready <span>Reports</span>
                        </h1>

                        <p class="description wow pixFadeUp" data-wow-delay="0.5s">
                            From cluttered CSVs to stunning dashboards — all with your team’s real goals in mind.
                        </p>

                        <a href="{% url 'accounts:register' %}" class="pxs-btn banner-btn wow pixFadeUp" data-wow-delay="0.6s">
                            Start uploading your data today
                        </a>
                    </div>
                </div>

                <div class="col-lg-6 d-flex justify-content-center align-items-center" style="padding-left: 10% !important;">
                    <div class="promo-mockup" style="
                        max-width: 750px;
                        width: 100%;
                        background-color: white;
                        border-radius: 12px;
                        box-shadow: 0 10px 30px rgba(0,0,0,0.07);
                        transition: transform 0.3s ease;
                    ">
                        <img src="{% static 'img/banner/before-after.png' %}" alt="before-after graphic" style="width: 120%; border-radius: 8px;">
                    </div>
                </div>                
            </div>
        </div>
    </div>

    <div class="bg-shape">
        <img src="{% static 'img/banner/shape-bg.png' %}" alt="">
    </div>
</section>
