{% extends 'base.html' %}
{% load static %}

{% block title %} Success! {% endblock %}

{% block content %}
<section class="call-to-action">
    <div class="overlay-bg"><img src="{% static 'img/background/ellipse.png' %}" alt="bg"></div>
    <div class="container">
        <div class="action-content text-center wow pixFadeUp">
            <h2 class="title">
                Hurray!
            </h2>

            <p>
                Welcome to the revolution on data! A place where you can gain insights and take your
                endeavor to the next level!!
            </p>
        </div>
        <!-- /.action-content -->
    </div>
    <!-- /.container -->

    <div class="scroll-circle">
        <img src="{% static 'img/background/circle13.png' %}" data-parallax='{"y" : -130}' alt="circle">
    </div>
    <!-- /.scroll-circle -->
</section>
{% endblock content %}
