{% extends "base.html" %}
{% load static %}

{% block title %}404 Not Found{% endblock title %}

{% block content %}
<section class="page-banner-contact" style="background-color: #2bba64; color: white;">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-8">
                <div class="page-title-wrapper">
                    <div class="page-title-inner">
                        <h1 class="page-title">404 – Page Not Found</h1>
                        <p>
                            We couldn’t find the page you were looking for.  
                            The link might be broken or the page may have been moved.
                            <br><br>
                            <a href="{% url 'home' %}" class="pix-btn" style="margin-top: 10px;">
                                <span class="btn-text">Back to Homepage</span>
                            </a>
                        </p>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 text-center">
                <div class="animate-element-contact">
                    <img src="{% static 'img/animated/404-illustration.png' %}" alt="404 Illustration" class="wow pixFadeUp" data-wow-duration="1.5s" style="max-width: 100%;">
                </div>
            </div>
        </div>
    </div>

    <svg class="circle" data-parallax='{"y" : 250}' xmlns="http://www.w3.org/2000/svg" width="950px" height="950px">
        <path fill-rule="evenodd" stroke="white" stroke-width="100px" opacity="0.03" fill="none" d="M450.000,50.000 C670.914,50.000 850.000,229.086 850.000,450.000 C850.000,670.914 670.914,850.000 450.000,850.000 C229.086,850.000 50.000,670.914 50.000,450.000 C50.000,229.086 229.086,50.000 450.000,50.000 Z" />
    </svg>

    <ul class="animate-ball">
        <li class="ball"></li>
        <li class="ball"></li>
        <li class="ball"></li>
        <li class="ball"></li>
        <li class="ball"></li>
    </ul>
</section>
{% endblock content %}
