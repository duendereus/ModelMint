{% extends "base.html" %}
{% block title %}Reset Password{% endblock title %}
{% block content %}
<section class="page-banner" style="max-height: 400px !important;">
    <div class="container">
        <div class="page-title-wrapper">
            <h1 class="page-title">Enter your email to receive a password reset link.</h1>
            <p>Enter your email to receive a password reset link.</p>
        </div>
        <!-- /.page-title-wrapper -->
    </div>
    <!-- /.container -->

    <svg class="circle" data-parallax='{"x" : -200}' xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="950px" height="950px">
        <path fill-rule="evenodd" stroke="rgb(250, 112, 112)" stroke-width="100px" stroke-linecap="butt" stroke-linejoin="miter" opacity="0.051" fill="none" d="M450.000,50.000 C670.914,50.000 850.000,229.086 850.000,450.000 C850.000,670.914 670.914,850.000 450.000,850.000 C229.086,850.000 50.000,670.914 50.000,450.000 C50.000,229.086 229.086,50.000 450.000,50.000 Z" />
    </svg>

    <ul class="animate-ball">
        <li class="ball"></li>
        <li class="ball"></li>
        <li class="ball"></li>
        <li class="ball"></li>
        <li class="ball"></li>
    </ul>
</section>

<section>    
    <section class="contactus">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="contact-forms">
                        <form method="POST">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="pix-btn submit-btn">
                                <span class="btn-text">Get Reset Password Email</span>
                                <i class="fas fa-spinner fa-spin"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</section>
{% endblock %}
