<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Lato:400,700">
    <meta property="og:title" content="Contact Notification">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css">
        body {
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: #f2faf2;
            color: #626c78;
        }

        #email {
            margin: auto;
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            border: 1px solid #bfffd9;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            padding: 20px 0;
            background-color: #2bba64;
            color: white;
            border-bottom: 3px solid #0db851;
        }

        .content {
            padding: 30px 20px;
            text-align: left;
        }

        .content h2 {
            font-size: 22px;
            color: #2bba64;
            margin-bottom: 15px;
        }

        .content p {
            font-size: 16px;
            line-height: 1.5;
            margin: 10px 0;
        }

        .footer {
            background-color: #6aba8a;
            color: #ffffff;
            text-align: center;
            padding: 15px;
            border-radius: 0 0 8px 8px;
            font-size: 14px;
        }

        .footer p {
            margin: 5px 0;
        }

        .footer a {
            color: #ffffff;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div id="email">
        <!-- Header Section -->
        <div class="header">
            <h1>Activate Your Account</h1>
            <img alt="Logo" src="https://modelmint.co/static/img/logo-white.a96867406c14.svg" width="100" height="100">
        </div>


        <div class="content">
            <h2>Activate Your Account</h2>
            <p>Hello {{ user.username }},</p>
            <p class="mb-4">Click the button below to activate your account:</p>
            <p style="text-align: center;" class="mt-4">
                <a href="{{ scheme }}://{{ domain }}{% url 'accounts:activate' uidb64=uid token=token %}"
                   style="background-color: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">
                    Activate My Account
                </a>
            </p>
        </div>

    <div class="footer">
        <p>© {% now "Y" %} <a href="https://modelmint.co">ModelMint</a> All rights reserved.</p>
    </div>
</body>
</html>
