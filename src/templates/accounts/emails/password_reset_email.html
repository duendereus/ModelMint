<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Lato:400,700">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css">
        body {
            font-family: 'Lato', sans-serif;
            background-color: #f2faf2;
            color: #626c78;
            text-align: center;
        }

        #email {
            max-width: 600px;
            margin: auto;
            background: white;
            border: 1px solid #bfffd9;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            background-color: #2bba64;
            color: white;
            border-bottom: 3px solid #0db851;
        }

        .content {
            padding: 30px 20px;
            text-align: left;
        }

        .content h2 {
            font-size: 22px;
            color: #2bba64;
            margin-bottom: 15px;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        .footer {
            background-color: #6aba8a;
            color: #ffffff;
            text-align: center;
            padding: 15px;
            border-radius: 0 0 8px 8px;
            font-size: 14px;
        }

        .footer a {
            color: #ffffff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div id="email">
        <!-- Header Section -->
        <div class="header">
            <h1>Password Reset Request</h1>
            <img alt="Logo" src="https://modelmint.co/static/img/logo-white.9644615fed48.png" width="100" height="100">
        </div>

        <!-- Content Section -->
        <div class="content">
            <h2>Reset Your Password</h2>
            <p>Hello {{ user.username }},</p>
            <p class="mb-4">You have requested to reset your password. Click the button below to proceed:</p>
            <p style="text-align: center;">
                <a href="{{ scheme }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}"
                    class="button"
                    style="background-color: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;"></a>>
                    Reset Password
                </a>
            </p>
            <p>If you did not request this, please ignore this email.</p>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>© {% now "Y" %} <a href="https://modelmint.co">ModelMint</a> All rights reserved.</p>
        </div>
    </div>
</body>
</html>
