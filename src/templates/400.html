{% extends "base.html" %}
{% load static %}

{% block title %}400 Bad Request{% endblock title %}

{% block content %}
<section class="page-banner-contact" style="background-color: #2bba64; color: white;">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-8">
                <div class="page-title-wrapper">
                    <div class="page-title-inner">
                        <h1 class="page-title">400 – Bad Request</h1>
                        <p>
                            Hmm... Something went wrong with your request.  
                            It might be malformed or incomplete. Try again or contact support.
                            <br><br>
                            <a href="{% url 'home' %}" class="pix-btn" style="margin-top: 10px;">
                                <span class="btn-text">Back to Homepage</span>
                            </a>
                        </p>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 text-center">
                <div class="animate-element-contact">
                    <img src="{% static 'img/animated/400-illustration.svg' %}" alt="400 Illustration" class="wow pixFadeUp" data-wow-duration="1.5s" style="max-width: 100%;">
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
